const MEANINGS = ["I","all","and","animal","ant","arm","ash","at","back","bad","bark","belly","big","bird","bite","bitter","black","blood","blow","bone","breathe","bride","burn","carry","chest","child","claw","close","cloud","cold","come","count","cry","cut","daughter","day","die","dig","dirty","do","dog","drink","dry","dust","ear","earth","eat","egg","eight","eye","fall","far","fat","father","fear","feather","few","fight","fire","fish","five","float","flow","flower","fly_N","fly_V","fog","foot","forest","four","freeze","fruit","full","give","go","good","grass","green","grind","guts","hair","hand","hard","head","hear","heart","heavy","here","hide","hit","hold","horn","hot","house","how","hundred","hungry","hunt","husband","ice","kill","knee","know","lake","laugh","leaf","left","leg","lie","live","liver","long","louse","man","many","meat","moon","mother","mountain","mouth","nail","name","narrow","navel","near","neck","new","night","nose","not","old","one","other","person","play","pour","pull","push","rain","red","right","river","road","root","rope","rotten","round","run","salt","sand","say","scratch","sea","see","seed","sew","shadow","sharp","short","sing","sister","sit","six","skin","sky","sleep","small","smell","smoke","smooth","snake","snow","son","spit","split","stab","stand","star","stick","stone","straight","suck","summer","sun","sweep","sweet","swell","swim","tail","take","ten","that","there","they","thick","thigh","thin","think","this","three","throw","tie","tongue","tooth","tree","true","turn","two","vomit","walk","wash","water","we","wet","what","when","where","white","who","wide","wife","wind","wing","winter","with","woman","wood","worm","year","yellow","yesterday","you_pl.","you_sg."];

function getAllLanguagesFromPieData(data) {
  const langsSet = new Set();
  data.forEach(entry => {
    if (entry.lang_forms && typeof entry.lang_forms === 'object') {
      Object.keys(entry.lang_forms).forEach(lang => langsSet.add(lang));
    }
  });
  return Array.from(langsSet).sort((a, b) => a.localeCompare(b));
}

const ALL_LANGS = getAllLanguagesFromPieData(PIE_DATA);


function ll(k){return LANG_LABELS[k]||k.replace(/([A-Z])/g,' $1').trim();}
function norm(s){return(s||'').toLowerCase().replace(/[*₁₂₃₄]/g,'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ._]/g,'').trim();}

// Populate language dropdown
const sel=document.getElementById('lang-sel');
ALL_LANGS.forEach(lang=>{
  const opt=document.createElement('option');
  opt.value=lang; opt.textContent=ll(lang); sel.appendChild(opt);
});

// ── Autocomplete ──────────────────────────────────────────
const qEl=document.getElementById('q');
const acList=document.getElementById('ac-list');
let acIdx=-1, acItems=[];

function highlight(text, query){
  if(!query) return text;
  const i=text.toLowerCase().indexOf(query.toLowerCase());
  if(i<0) return text;
  return text.slice(0,i)+'<mark>'+text.slice(i,i+query.length)+'</mark>'+text.slice(i+query.length);
}

function showAC(items, query){
  acItems=items; acIdx=-1;
  if(!items.length){acList.classList.remove('open');return;}
  acList.innerHTML=items.map((item,i)=>
    `<div class="ac-item" data-i="${i}" onmousedown="pickAC(${i})">${highlight(item,query)}</div>`
  ).join('');
  acList.classList.add('open');
}

function hideAC(){acList.classList.remove('open');acIdx=-1;}

function pickAC(i){
  qEl.value=acItems[i];
  hideAC();
  if(sel.value!=='__meaning__'){sel.value='__meaning__';onLangChange();}
  search();
}

qEl.addEventListener('input',()=>{
  const lang=sel.value;
  if(lang!=='__meaning__'){hideAC();return;}
  const val=qEl.value.trim();
  if(!val){hideAC();return;}
  const nval=val.toLowerCase();
  // starts-with first, then contains
  const starts=MEANINGS.filter(m=>m.toLowerCase().startsWith(nval));
  const contains=MEANINGS.filter(m=>!m.toLowerCase().startsWith(nval)&&m.toLowerCase().includes(nval));
  const results=[...starts,...contains].slice(0,8);
  showAC(results,val);
});

qEl.addEventListener('keydown',e=>{
  if(!acList.classList.contains('open')){if(e.key==='Enter')search();return;}
  const items=acList.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown'){e.preventDefault();acIdx=Math.min(acIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('selected',i===acIdx));}
  else if(e.key==='ArrowUp'){e.preventDefault();acIdx=Math.max(acIdx-1,-1);items.forEach((el,i)=>el.classList.toggle('selected',i===acIdx));}
  else if(e.key==='Enter'){e.preventDefault();if(acIdx>=0)pickAC(acIdx);else{hideAC();search();}}
  else if(e.key==='Escape'){hideAC();}
});

document.addEventListener('click',e=>{if(!e.target.closest('.input-wrap'))hideAC();});
// ─────────────────────────────────────────────────────────

function onLangChange(){
  const lang=sel.value;
  hideAC();
  if(lang==='__meaning__') qEl.placeholder='Search English meaning… (e.g. fire, run, cold)';
  else if(lang==='__root__') qEl.placeholder='Search PIE root… (e.g. *mer, *ph₂ter)';
  else if(lang==='__all__') qEl.placeholder='Search form in any language…';
  else qEl.placeholder=`Search form in ${ll(lang)}…`;
}

function scoreEntry(e,q,lang){
  const nq=norm(q);
  if(lang==='__meaning__'){
    const nm=e.meanings.map(m=>norm(m.replace(/_pst3sg|_pst/g,''))).join(' ');
    const ng=norm(e.gloss);
    const exactMatch=e.meanings.map(m=>norm(m.replace(/_pst3sg|_pst/g,''))).some(m=>m===nq)||ng===nq;
    if(exactMatch) return {s:100,match:null};
    if(nm.includes(nq)||ng.includes(nq)) return {s:60,match:null};
    return {s:0,match:null};
  }
  if(lang==='__root__'){
    const nr=norm(e.root);
    if(nr===nq) return {s:100,match:null};
    if(nr.startsWith(nq)) return {s:90,match:null};
    if(nr.includes(nq)) return {s:70,match:null};
    return {s:0,match:null};
  }
  const checkLangs=lang==='__all__'?Object.keys(e.lang_forms):(e.lang_forms[lang]?[lang]:[]);
  for(const l of checkLangs){
    const form=e.lang_forms[l]||'';
    const nf=norm(form);
    if(nf===nq) return {s:100,match:{l,form}};
    if(nf.startsWith(nq)) return {s:85,match:{l,form}};
    if(nf.includes(nq)) return {s:60,match:{l,form}};
  }
  return {s:0,match:null};
}

let current=[],shown=15;

function card(e,i,match){
  const m=e.meanings.map(m=>m.replace(/_pst3sg|_pst/g,'')).join(', ');
  const loan=e.loanword?'<span class="loan-badge">loanword</span>':'';
  const gl=e.gloss?`<span class="gloss">${e.gloss}</span>`:'';
  const matchBadge=match?`<span class="match-form">${ll(match.l)}: ${match.form}</span>`:'';
  const langHL=match?match.l:null;
  const langs=Object.entries(e.lang_forms).map(([k,v])=>{
    const hl=k===langHL?' hl':'';
    return `<div class="lang-item${hl}">${ll(k)}: <span>${v}</span></div>`;
  }).join('');
  const notes=e.notes?`<div class="slabel">Notes</div><div class="notes">${e.notes}</div>`:'';
  return `<div class="card" id="c${i}" onclick="tog(${i})">
    <div class="card-top"><span class="root">${e.root}</span><span class="meaning">${m}</span>${gl}${matchBadge}${loan}</div>
    <div class="body"><div class="slabel">Cognates across ${Object.keys(e.lang_forms).length} languages</div><div class="lang-grid">${langs||'<span style="color:#aaa;font-size:13px">No forms recorded</span>'}</div>${notes}<div style="margin-top:8px;font-size:11px;color:#aaa">IE-CoR id: ${e.id}</div></div>
  </div>`;
}

function tog(i){document.getElementById('c'+i).classList.toggle('open');}

function render(){
  const hide=document.getElementById('hide-loans').checked;
  const f=hide?current.filter(x=>!x.e.loanword):current;
  const sl=f.slice(0,shown);
  document.getElementById('res').innerHTML=sl.map((x,i)=>card(x.e,i,x.match)).join('');
  document.getElementById('cnt').textContent=f.length+' result'+(f.length!==1?'s':'')+(f.length>shown?' (showing '+sl.length+')':'');
  const mw=document.getElementById('more-wrap');
  mw.innerHTML=f.length>shown?`<div class="more-btn" onclick="more()">Show more (${f.length-shown} remaining)</div>`:'';
}

function more(){shown+=20;render();}

function search(){
  const q=document.getElementById('q').value.trim();
  const lang=sel.value;
  const nr=document.getElementById('no-res');
  nr.style.display='none'; shown=15;
  if(!q){current=[];document.getElementById('res').innerHTML='';document.getElementById('cnt').textContent='';return;}
  current=PIE_DATA.map(e=>{const r=scoreEntry(e,q,lang);return{e,s:r.s,match:r.match};})
    .filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
  if(!current.length){
    nr.textContent=`No results for "${q}" in ${lang==='__meaning__'?'English meanings':lang==='__root__'?'PIE roots':lang==='__all__'?'any language':ll(lang)}.`;
    nr.style.display='block';
    document.getElementById('res').innerHTML='';
    document.getElementById('cnt').textContent='';
  } else render();
}

function goMeaning(v){sel.value='__meaning__';onLangChange();qEl.value=v;search();}
function goRoot(v){sel.value='__root__';onLangChange();qEl.value=v;search();}
function goLang(lang,v){sel.value=lang;onLangChange();qEl.value=v;search();}

onLangChange();
</script>
